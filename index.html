<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadiel & Mary</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

<!-- LANDING -->
<div id="landing">

    <h1 class="nombres">Jadiel & Mary</h1>
   
<div class="fecha">
    <span>30</span>
    <span class="dot">•</span>
    <span>05</span>
    <span class="dot">•</span>
    <span>2026</span>
</div>

<p class="texto">Haz clic en el sobre para abrir tu invitación</p>


  <div class="sobre" id="sobre">

    <div class="base"></div>
    <div class="carta"></div>

    <div class="lado-izq"></div>
    <div class="lado-der"></div>
    <div class="frente"></div>

    <div class="tapa"></div>
    <div class="sello">
    <img src="img/sello.png" alt="sello">
</div>

</div>

</div>


<!-- CONTENIDO PRINCIPAL -->
<div id="contenido" class="oculto">

    <div class="contenedor">

        <h1 class="nombres">Jadiel & Mary</h1>

        <div class="contador" id="contador">

            <h2 id="mensaje">Faltan...</h2>

            <div class="tiempo">

                <div class="box">
                    <span id="dias">00</span>
                    <small>Días</small>
                </div>

                <div class="dots">:</div>

                <div class="box">
                    <span id="horas">00</span>
                    <small>Horas</small>
                </div>

                <div class="dots">:</div>

                <div class="box">
                    <span id="minutos">00</span>
                    <small>Min</small>
                </div>

                <div class="dots">:</div>

                <div class="box">
                    <span id="segundos">00</span>
                    <small>Seg</small>
                </div>

            </div>

        </div>

        <div id="hoy" class="oculto">
            <h2>¡Es Hoy!</h2>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
